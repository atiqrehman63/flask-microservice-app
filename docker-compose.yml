version: "3"

services:
  api:
    build: .
    ports:
      - "5003:5000"
    environment:
      APP_ENV: development
      REDIS_HOST: redis
      DB_HOST: postgres

  redis:
    image: redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: microservice_db
    ports:
      - "5432:5432"